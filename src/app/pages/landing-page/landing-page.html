<div class="container">
  <header class="landing-header">
    <img src="/assets/images/ui/logo_orange.svg" alt="the logo of the app" />
  </header>

  <main class="landing-page">
    <!-- HERO SECTION -->
    <section class="landing-page__hero">
      <div class="landing-page__hero-left">
        <h1 class="landing-page__title">Collect Feedback, <br />Unlock Ideas</h1>
        <p class="landing-page__subtitle">
          Create and share surveys in minutes - from team events to workplace culture. Collect
          opinions, engage your audience, and turn feedback into action.
        </p>
        <button class="landing-page__cta">New survey</button>
      </div>

      <div class="landing-page__hero-right">
        <div class="landing-page__visual"></div>
      </div>
    </section>

    <!-- ENDING SOON SECTION -->
    <section class="landing-page__ending-soon">
      <h2 class="landing-page__section-title">Your surveys</h2>
      <h3 class="landing-page__section-subtitle">Ending soon surveys</h3>

      <app-survey-list></app-survey-list>
    </section>

    <!-- ACTIVE / PAST SURVEYS SECTION -->
    <section class="landing-page__filters">
      <div class="landing-page__filters-left">
        <button class="landing-page__filter-btn landing-page__filter-btn--active">
          Active surveys
        </button>
        <button class="landing-page__filter-btn">Past surveys</button>
      </div>

      <div class="landing-page__filters-right">
        <p class="landing-page__categories-label">Sort by categories</p>
        <img class="landing-page__categories-icon" src="" alt="" />
      </div>
    </section>
  </main>
</div>
