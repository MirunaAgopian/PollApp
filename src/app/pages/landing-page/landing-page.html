<div class="container">
  <header class="landing-header">
    <img src="/assets/images/ui/logo_orange.svg" alt="the logo of the app" />
  </header>

  <main class="landing-page">
    <!-- HERO SECTION -->
    <section class="landing-page__hero">
      <div class="landing-page__hero-left">
        <h1 class="landing-page__title">Collect Feedback, <br />Unlock Ideas</h1>
        <p class="landing-page__subtitle">
          Create and share surveys in minutes - from team events to workplace culture. Collect
          opinions, engage your audience, and turn feedback into action.
        </p>
        <button class="btn btn--primary btn--icon-plus landing-page__cta">New survey</button>
      </div>

      <div class="landing-page__hero-right">
        <div class="landing-page__visual">
          <img
            src="/assets/images/ui/visual_hero.png"
            class="landing-page__visual-center"
            alt="a drawing of a phone"
          />
          <img
            src="/assets/images/ui/visual_hero_typing_bubble.svg"
            class="landing-page__visual-icon landing-page__visual-icon--chat"
            alt="a typing bubble"
          />
          <img
            src="/assets/images/ui/visual_hero_questionmark.svg"
            class="landing-page__visual-icon landing-page__visual-icon--question"
            alt="a question mark"
          />
          <img
            src="/assets/images/ui/visual_hero_check.svg"
            class="landing-page__visual-icon landing-page__visual-icon--check"
            alt="a checkmark"
          />
          <img
            src="/assets/images/ui/visual_hero_star.svg"
            class="landing-page__visual-icon landing-page__visual-icon--star"
            alt="a star"
          />
        </div>
      </div>
    </section>

    <!-- ENDING SOON SECTION -->
    <section class="landing-page__ending-soon centered-section section-spacing-vertical">
      <h2 class="landing-page__section-title">Your surveys</h2>
      <h3 class="landing-page__section-subtitle">Ending soon surveys</h3>
      <app-survey-list></app-survey-list>
    </section>

    <!-- ACTIVE / PAST SURVEYS SECTION -->
    <section class="landing-page__filters centered-section section-spacing-vertical">
      <div class="landing-page__filters-top">
        <div class="landing-page__filters-left">
          <button
            class="btn-secondary"
            [class.btn-secondary-active]="activeFilter === 'active'"
            [class.btn-secondary-inactive]="activeFilter !== 'active'"
            (click)="activeFilter = 'active'"
          >
            Active surveys
          </button>

          <button
            class="btn-secondary"
            [class.btn-secondary-active]="activeFilter === 'past'"
            [class.btn-secondary-inactive]="activeFilter !== 'past'"
            (click)="activeFilter = 'past'"
          >
            Past surveys
          </button>
        </div>

        <div class="landing-page__filters-right">
          <button
            class="btn-tertiary landing-page__categories-btn"
            (click)="isCategoriesOpen = !isCategoriesOpen"
            [class.open]="isCategoriesOpen"
          >
            <span>Sort by categories</span>

            <svg class="icon" width="15" height="8" viewBox="0 0 15 8">
              <path
                d="M6.5843 7.61702L0.261628 1.44681C0.174419 1.3617 0.109012 1.2695 0.065407 1.17021C0.0218023 1.07092 0 0.964539 0 0.851064C0 0.624114 0.0799419 0.425532 0.239826 0.255319C0.399709 0.0851064 0.610465 0 0.872093 0H14.1279C14.3895 0 14.6003 0.0851064 14.7602 0.255319C14.9201 0.425532 15 0.624114 15 0.851064C15 0.907802 14.9128 1.10638 14.7384 1.44681L8.4157 7.61702C8.27035 7.75887 8.125 7.85816 7.97965 7.91489C7.8343 7.97163 7.67442 8 7.5 8C7.32558 8 7.1657 7.97163 7.02035 7.91489C6.875 7.85816 6.72965 7.75887 6.5843 7.61702Z"
              />
            </svg>
          </button>
          <span class="landing-page__filters-right-selected"></span>
          <div class="dropdown"></div>
        </div>
      </div>
      <!-- <app-survey-list [filter]="activeFilter" sort="soonest-first"> </app-survey-list> -->
    </section>
  </main>
</div>
