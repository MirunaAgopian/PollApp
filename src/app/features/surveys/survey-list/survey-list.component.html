<div class="landing-page__ending-soon-cards">
  @for (item of getfilteredSurveys(); track item.id) {
    <article class="card-primary" [routerLink]="['survey', item.id]">
      <p class="card-primary__category">{{ item.category }}</p>
      <h3 class="card-primary__title">{{ item.title }}</h3>
      <span class="card-primary__badge">{{ calculateRemainingDays(item.end_date) }}</span>
    </article>
  } @empty {
    <span>Huhu! There are no surveys to display!</span>
  }
</div>
