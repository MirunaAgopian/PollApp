<section class="vote-results">

  <div *ngFor="let o of options; trackBy: trackById">
    <p>{{ o.order_index }}</p>

    <div class="vote-results__row">
      <div
        class="vote-results_bar"
        [style.width.%]="computeVotesToPercentages(o.id)"
      ></div>

      <span class="vote-results_percentage">
        {{ computeVotesToPercentages(o.id) | percentage: 0 }}
      </span>
    </div>
  </div>

</section>
