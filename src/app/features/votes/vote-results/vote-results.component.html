<section class="vote-results">
  <h2>Survey results <span>LIVE</span></h2>
  <h2>{{ question.order_index }}. {{ question.text }}</h2>

  @for (o of options; track o.id) {
    <p>{{ o.order_index }}</p>
    <div>
      <div class="vote-results_bar"></div>
      <span class="vote-restults_percentage">{{
        computeVotesToPercentages() | percentage: 0
      }}</span>
    </div>
  }
</section>
