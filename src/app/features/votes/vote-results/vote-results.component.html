<section class="vote-results">
  @if (question) {
    <h2>{{ question.order_index }}. {{ question.text }}</h2>
  }
 
  @for (o of options; track o.id) {
    <p>{{ o.order_index }}</p>
    <div>
      <div class="vote-results_bar" [style.width.%]="computeVotesToPercentages(o.id)"></div>
      <span class="vote-restults_percentage">{{
        computeVotesToPercentages(o.id) | percentage: 0
      }}</span>
    </div>
  }
</section>
