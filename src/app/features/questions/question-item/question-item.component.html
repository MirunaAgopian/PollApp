<article class="question-item">
  <h2 class="question-item__title">{{ question.order_index }}. {{ question.text }}</h2>

  @if (isMultipleAllowed()) {
    <small class="question-item__multiple-info"> Multiple answers are possible. </small>
  }

  <div class="question-item__options">
    @for (o of options(); track o.id) {
      <app-option-item
        class="question-item__option"
        [option]="o"
        [totalVotesFromQuestion]="totalVotes()"
      >
      </app-option-item>
    }
  </div>

  <!--
  <section class="question-item__results">
    <app-vote-results
      [question]="question"
      [options]="options()"
      [totalVotes]="totalVotes()">
    </app-vote-results>
  </section>
  -->
</article>
